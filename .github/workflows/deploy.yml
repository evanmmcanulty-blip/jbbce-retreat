name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install app dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules and Storage rules first
        run: firebase deploy --only firestore:rules,storage --token "$FIREBASE_TOKEN" --project provincetown-2026
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy hosting and functions
        run: firebase deploy --only hosting,functions --token "$FIREBASE_TOKEN" --project provincetown-2026
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
